<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Pitch an event to Dear Eleanor in Miami." />
    <meta name="theme-color" content="#ed99aa" />
    <title>Pitch Your Event | Dear Eleanor</title>
    <link rel="icon" type="image/png" href="assets/dear-eleanor-logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Caveat:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script src="pitch.js" defer></script>
  </head>

  <body class="pitch-page">
    <a class="skip-link" href="#pitch-form">Skip to form</a>

    <header class="site-header pitch-header">
      <a class="brand" href="index.html" aria-label="Back to Dear Eleanor homepage">
        <img src="assets/dear-eleanor-logo.png" alt="" />
        <span>Dear Eleanor</span>
      </a>
      <a class="pitch-back" href="index.html">Back to the site <span>↙</span></a>
    </header>

    <main class="pitch-page-main">
      <section class="pitch-panel pitch-panel-standalone" aria-labelledby="pitch-title-heading">
        <span class="pitch-shape pitch-shape-ring" aria-hidden="true"></span>
        <span class="pitch-shape pitch-shape-diamond" aria-hidden="true"></span>
        <div class="pitch-intro">
          <p class="eyebrow"><span></span> Your idea, our room</p>
          <h1 id="pitch-title-heading">BRING IT TO<br /><em>THE ROOM.</em></h1>
          <p>You don’t need every detail—just give us the shape of it.</p>
          <div class="pitch-note">Made in Miami.<br /><strong>Dreamed up by you. ♡</strong></div>
        </div>

        <div class="bloom-form-card pitch-bloom-card" id="pitch-form">
          <div class="bloom-frame-mount" data-bloom-frame-mount>
            <p>Loading the pitch form...</p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
